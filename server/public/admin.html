<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后端管理系统 - 登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .login-container {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }
        
        .login-container h1 {
            text-align: center;
            margin-bottom: 2rem;
            color: #333;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #555;
            font-weight: bold;
        }
        
        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.2);
        }
        
        .btn {
            width: 100%;
            padding: 0.75rem;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        
        .btn:hover {
            background: #5568d3;
        }
        
        .error-message {
            color: #e74c3c;
            text-align: center;
            margin-bottom: 1rem;
        }
        
        .success-message {
            color: #2ecc71;
            text-align: center;
            margin-bottom: 1rem;
        }
        
        .status-info {
            text-align: center;
            margin-top: 1rem;
            color: #666;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>后端管理系统</h1>
        
        <div id="message" class="error-message" style="display: none;"></div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" placeholder="请输入用户名" required>
            </div>
            
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" placeholder="请输入密码" required>
            </div>
            
            <button type="submit" class="btn">登录</button>
        </form>
        
        <div class="status-info">
            后端服务运行状态：<span id="status">检查中...</span>
        </div>
    </div>
    
    <script>
        // 模拟登录功能
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('message');
            
            // 简单的硬编码验证（实际项目中应使用数据库和加密）
            if (username === 'admin' && password === 'admin123') {
                messageDiv.className = 'success-message';
                messageDiv.textContent = '登录成功！欢迎进入管理系统。';
                messageDiv.style.display = 'block';
                
                // 可以在这里添加跳转逻辑
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
            } else {
                messageDiv.className = 'error-message';
                messageDiv.textContent = '用户名或密码错误，请重试。';
                messageDiv.style.display = 'block';
            }
        });
        
        // 检查后端服务状态
        function checkStatus() {
            fetch('http://localhost:3001/health')
                .then(response => {
                    if (response.ok) {
                        document.getElementById('status').textContent = '运行正常 ✅';
                    } else {
                        document.getElementById('status').textContent = '服务异常 ❌';
                    }
                })
                .catch(error => {
                    document.getElementById('status').textContent = '无法连接 ❌';
                });
        }
        
        // 页面加载时检查状态
        checkStatus();
        // 每5秒检查一次状态
        setInterval(checkStatus, 5000);
    </script>
</body>
</html>
